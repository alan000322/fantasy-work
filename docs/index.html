<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天兵聯盟 s2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #0891B2;
      --primary-light: #22D3EE;
      --primary-dark: #0E7490;
      --accent: #0D9488;
      --cta: #0891B2;
      --bg: #F8FAFB;
      --bg-card: #FFFFFF;
      --bg-muted: #F1F5F9;
      --text: #0F172A;
      --text-secondary: #475569;
      --text-muted: #94A3B8;
      --border: #E2E8F0;
      --border-light: #F1F5F9;
      --success: #10B981;
      --error: #EF4444;
      --radius: 16px;
      --radius-sm: 10px;
      --shadow-sm: 0 1px 3px rgba(15,23,42,0.04), 0 1px 2px rgba(15,23,42,0.06);
      --shadow-md: 0 4px 12px rgba(15,23,42,0.06), 0 2px 4px rgba(15,23,42,0.04);
      --shadow-lg: 0 12px 32px rgba(15,23,42,0.08), 0 4px 8px rgba(15,23,42,0.04);
      --transition: 200ms ease;
    }

    body {
      font-family: 'Barlow', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== Header ===== */
    .header {
      background: var(--bg-card);
      padding: 20px 20px 0;
      border-bottom: 1px solid var(--border);
    }
    .header-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .header-logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .header-logo svg { width: 22px; height: 22px; }
    .header-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
    }
    .header-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
      margin-top: 1px;
    }

    /* ===== Tabs ===== */
    .tabs {
      display: flex;
      gap: 0;
    }
    .tab {
      flex: 1;
      padding: 12px 0;
      background: none;
      border: none;
      border-bottom: 2.5px solid transparent;
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: color var(--transition), border-color var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .tab:hover { color: var(--text-secondary); }
    .tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }
    .tab svg { width: 18px; height: 18px; }

    /* ===== Pages ===== */
    .page { display: none; padding: 20px 16px 32px; max-width: 480px; margin: 0 auto; }
    .page.active { display: block; }

    /* ===== Cards ===== */
    .card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 12px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-light);
    }

    .card.accent-card {
      background:
        radial-gradient(circle at top right, rgba(34, 211, 238, 0.18), transparent 42%),
        linear-gradient(160deg, #ecfeff 0%, #f8fafb 55%, #ffffff 100%);
      border-color: #bae6fd;
    }
    .section-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    .section-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .section-kicker {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--primary-dark);
      font-weight: 700;
      margin-bottom: 6px;
    }
    .section-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 28px;
      line-height: 0.95;
      color: var(--text);
    }
    .section-caption {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-top: 8px;
      max-width: 26ch;
    }
    .pill-note {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(8,145,178,0.08);
      color: var(--primary-dark);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    /* ===== Stepper ===== */
    .stepper {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 20px;
      padding: 0 4px;
    }
    .step-item {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
    }
    .step-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--bg-muted);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
      transition: all var(--transition);
    }
    .step-item.active .step-dot {
      background: var(--primary);
      color: #fff;
    }
    .step-item.done .step-dot {
      background: var(--success);
      color: #fff;
    }
    .step-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      transition: color var(--transition);
      white-space: nowrap;
    }
    .step-item.active .step-label { color: var(--text); }
    .step-item.done .step-label { color: var(--success); }
    .step-line {
      flex: 0.5;
      height: 2px;
      background: var(--border);
      margin: 0 4px;
    }
    .step-line.done { background: var(--success); }

    /* ===== Team Item ===== */
    .team-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .team-item:hover, .team-item:active {
      border-color: var(--primary-light);
      box-shadow: var(--shadow-sm);
    }
    .team-name { font-size: 15px; font-weight: 600; color: var(--text); }
    .team-manager { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .team-arrow { color: var(--text-muted); }
    .team-arrow svg { width: 16px; height: 16px; }

    /* ===== Player Row ===== */
    .player-row {
      display: grid;
      grid-template-columns: 42px 1fr 24px;
      gap: 10px;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border-light);
    }
    .player-row:last-child { border-bottom: none; }
    .player-pos {
      font-size: 11px;
      font-weight: 700;
      text-align: center;
      padding: 4px 2px;
      border-radius: 6px;
      background: var(--bg-muted);
      color: var(--text-secondary);
      letter-spacing: 0.3px;
    }
    .player-pos.SP, .player-pos.RP, .player-pos.P { background: #EDE9FE; color: #7C3AED; }
    .player-pos.C, .player-pos.SS { background: #E0F2FE; color: #0369A1; }
    .player-pos.OF { background: #DCFCE7; color: #15803D; }
    .player-pos.BN { background: #F5F5F4; color: #78716C; }
    .player-pos.NA { background: #F5F5F4; color: #A8A29E; }
    .player-pos.Util { background: #FEF3C7; color: #B45309; }
    .player-name { font-size: 14px; font-weight: 500; color: var(--text); }
    .player-team-info { font-size: 12px; color: var(--text-muted); margin-top: 1px; }

    .player-row.selectable {
      cursor: pointer;
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      margin: 0 -12px;
      border-bottom: none;
      transition: background var(--transition), border-color var(--transition);
      border: 2px solid transparent;
    }
    .player-row.selectable + .player-row.selectable { margin-top: -1px; }
    .player-row.selectable:hover, .player-row.selectable:active { background: var(--bg-muted); }
    .player-row.selectable.selected {
      background: #ECFEFF;
      border-color: var(--primary-light);
    }
    .player-row .check-icon {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
      flex-shrink: 0;
    }
    .player-row.selected .check-icon {
      background: var(--primary);
      border-color: var(--primary);
    }
    .player-row .check-icon svg { opacity: 0; transition: opacity var(--transition); }
    .player-row.selected .check-icon svg { opacity: 1; }

    /* ===== Want Count ===== */
    .want-count-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }
    .count-stepper {
      display: inline-flex;
      align-items: center;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: var(--bg-card);
    }
    .count-stepper button {
      width: 32px;
      height: 32px;
      border: none;
      background: none;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition);
    }
    .count-stepper button:hover { background: var(--bg-muted); }
    .count-stepper button:disabled { color: var(--border); cursor: not-allowed; }
    .count-stepper .count-val {
      width: 28px;
      text-align: center;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      border-left: 1.5px solid var(--border);
      border-right: 1.5px solid var(--border);
      line-height: 32px;
    }

    /* ===== Position Chips ===== */
    .pos-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .pos-chip {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--bg-card);
      font-family: 'Barlow', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition);
    }
    .pos-chip:hover { border-color: var(--primary-light); }
    .pos-chip.selected {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    /* ===== Selected Players List ===== */
    .selected-players-list { display: flex; flex-direction: column; gap: 8px; }
    .selected-player-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, #F0FDFA 0%, #ECFEFF 100%);
      border: 1px solid #A5F3FC;
      border-radius: var(--radius-sm);
      padding: 12px 14px;
    }
    .selected-player-chip .sp-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }
    .selected-player-chip .sp-detail {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Step 2 footer */
    .step2-footer {
      position: sticky;
      bottom: 0;
      background: var(--bg);
      padding: 12px 0 4px;
      margin-top: 12px;
    }
    .step2-footer .btn-primary { font-size: 14px; padding: 12px; }

    /* ===== Trade Listing Card ===== */
    .trade-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 10px;
      transition: box-shadow var(--transition);
    }
    .trade-card:hover { box-shadow: var(--shadow-md); }
    .trade-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .trade-player-name { font-size: 16px; font-weight: 700; color: var(--text); }
    .trade-meta { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
    .trade-date { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
    .trade-desc {
      font-size: 13px;
      color: var(--text-secondary);
      background: var(--bg-muted);
      padding: 10px 12px;
      border-radius: 8px;
      margin-top: 10px;
      line-height: 1.5;
    }

    /* ===== Team Analysis ===== */
    .analysis-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .analysis-week-meta {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 600;
    }
    .week-switcher {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    .week-chip {
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-secondary);
      border-radius: 999px;
      padding: 8px 12px;
      font-family: 'Barlow', sans-serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all var(--transition);
    }
    .week-chip:hover { border-color: var(--primary-light); color: var(--primary-dark); }
    .week-chip.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
      box-shadow: 0 8px 20px rgba(8,145,178,0.18);
    }
    .analysis-summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 16px;
    }
    .analysis-stat {
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(186,230,253,0.9);
    }
    .analysis-stat-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }
    .analysis-stat-value {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
    }
    .analysis-story-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 14px;
    }
    .story-row {
      display: grid;
      grid-template-columns: 76px 1fr;
      gap: 10px;
      align-items: start;
      font-size: 13px;
      line-height: 1.5;
    }
    .story-label {
      color: var(--primary-dark);
      font-weight: 700;
    }
    .story-text { color: var(--text-secondary); }
    .team-analysis-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .analysis-team-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    .analysis-team-button {
      width: 100%;
      background: none;
      border: none;
      text-align: left;
      padding: 18px 18px 16px;
      cursor: pointer;
      font-family: 'Barlow', sans-serif;
    }
    .analysis-team-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .analysis-rank-group {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    .rank-badge {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: linear-gradient(135deg, #0f766e 0%, #0891b2 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      flex-shrink: 0;
      box-shadow: 0 10px 24px rgba(8,145,178,0.18);
    }
    .rank-badge span { font-size: 10px; opacity: 0.8; }
    .rank-badge strong {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      line-height: 1;
    }
    .analysis-team-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.15;
    }
    .analysis-team-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .analysis-team-total {
      text-align: right;
      flex-shrink: 0;
    }
    .analysis-team-total .value {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 32px;
      line-height: 1;
      color: var(--text);
    }
    .analysis-team-total .caption {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 4px;
    }
    .analysis-split-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }
    .split-stat {
      padding: 10px 12px;
      border-radius: 14px;
      background: var(--bg);
      border: 1px solid var(--border-light);
    }
    .split-stat .meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .split-stat .num {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }
    .delta {
      font-size: 12px;
      font-weight: 700;
    }
    .delta.up { color: var(--success); }
    .delta.down { color: var(--error); }
    .delta.flat { color: var(--text-muted); }
    .analysis-toggle {
      color: var(--text-muted);
      transition: transform var(--transition), color var(--transition);
      flex-shrink: 0;
    }
    .analysis-team-card.open .analysis-toggle {
      transform: rotate(180deg);
      color: var(--primary-dark);
    }
    .analysis-team-detail {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 220ms ease;
    }
    .analysis-team-card.open .analysis-team-detail {
      grid-template-rows: 1fr;
    }
    .analysis-team-detail-inner {
      overflow: hidden;
      border-top: 1px solid var(--border-light);
      padding: 0 18px;
    }
    .detail-block {
      padding: 16px 0;
      border-bottom: 1px solid var(--border-light);
    }
    .detail-block:last-child { border-bottom: none; }
    .detail-title {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
      font-weight: 700;
    }
    .trend-lines {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .contrib-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .contrib-box {
      background: var(--bg);
      border: 1px solid var(--border-light);
      border-radius: 14px;
      padding: 12px;
    }
    .contrib-box.top { background: linear-gradient(180deg, #f0fdfa 0%, #ffffff 100%); }
    .contrib-box.bottom { background: linear-gradient(180deg, #fff7ed 0%, #ffffff 100%); }
    .contrib-box-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }
    .contrib-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 13px;
      color: var(--text-secondary);
      padding: 6px 0;
      border-bottom: 1px solid var(--border-light);
    }
    .contrib-item:last-child { border-bottom: none; }
    .contrib-item strong { color: var(--text); font-weight: 600; }
    .mini-note {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    /* ===== Selected Player Preview ===== */
    .selected-player-card {
      background: linear-gradient(135deg, #F0FDFA 0%, #ECFEFF 100%);
      border: 1px solid #A5F3FC;
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
    }
    .selected-player-card .player-name-lg {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
    }
    .selected-player-card .player-detail {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px;
    }
    .selected-player-card .team-badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 600;
      color: var(--primary-dark);
      background: #CFFAFE;
      padding: 4px 10px;
      border-radius: 20px;
      margin-top: 8px;
    }

    /* ===== Buttons ===== */
    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'Barlow', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background var(--transition), transform 80ms ease;
      box-shadow: 0 2px 8px rgba(8,145,178,0.25);
    }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary svg { width: 18px; height: 18px; }

    .btn-success {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 24px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background var(--transition), transform 80ms ease;
    }
    .btn-success:hover { background: var(--primary-dark); }
    .btn-success:active { transform: scale(0.98); }
    .btn-success:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--text-secondary);
      font-family: 'Barlow', sans-serif;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 16px;
      cursor: pointer;
      background: none;
      border: none;
      transition: color var(--transition);
    }
    .back-btn:hover { color: var(--primary); }
    .back-btn svg { width: 16px; height: 16px; }

    /* ===== Form ===== */
    .form-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      display: block;
      margin-bottom: 6px;
    }
    .form-textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 12px 14px;
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
      resize: none;
      transition: border-color var(--transition);
      line-height: 1.5;
    }
    .form-textarea:focus { outline: none; border-color: var(--primary-light); }
    .form-textarea::placeholder { color: var(--text-muted); }

    /* ===== Empty & Loading & Error ===== */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
    }
    .empty-state svg { width: 48px; height: 48px; color: var(--border); margin-bottom: 12px; }
    .empty-state p { font-size: 14px; color: var(--text-muted); }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-size: 14px;
    }
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2.5px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error { color: var(--error); text-align: center; padding: 20px; font-size: 14px; }

    .success-msg {
      color: var(--success);
      text-align: center;
      margin-top: 14px;
      font-size: 14px;
      font-weight: 600;
    }

    /* ===== News ===== */
    .news-placeholder {
      text-align: center;
      padding: 32px 20px;
    }
    .news-placeholder svg { width: 40px; height: 40px; color: var(--text-muted); margin-bottom: 10px; opacity: 0.5; }
    .news-placeholder p { font-size: 14px; color: var(--text-muted); line-height: 1.6; }
    .news-subsection {
      margin-top: 22px;
    }
    .news-subsection:first-child {
      margin-top: 0;
    }
    .news-subsection-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .news-subsection-copy {
      min-width: 0;
    }
    .news-subsection-copy .section-label {
      margin-bottom: 4px;
    }
    .news-subsection-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 24px;
      line-height: 0.95;
      color: var(--text);
    }
    .news-subsection-caption {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-top: 8px;
    }
    .cbs-news-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .cbs-article-card {
      background: linear-gradient(180deg, #f0fdfa 0%, #ffffff 100%);
      border: 1px solid #bfdbfe;
      border-radius: 20px;
      padding: 16px;
      box-shadow: var(--shadow-sm);
    }
    .cbs-article-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }
    .cbs-article-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }
    .cbs-article-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 600;
    }
    .cbs-type-pill {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(8,145,178,0.12);
      color: var(--primary-dark);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }
    .cbs-article-summary {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(226,232,240,0.9);
    }
    .cbs-player-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 14px;
    }
    .cbs-player-row {
      display: grid;
      grid-template-columns: 36px 1fr;
      gap: 10px;
      align-items: start;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-light);
    }
    .cbs-player-row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }
    .cbs-rank {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      background: linear-gradient(135deg, #0f766e 0%, #0891b2 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      font-weight: 700;
      box-shadow: 0 8px 18px rgba(8,145,178,0.16);
    }
    .cbs-player-main {
      min-width: 0;
    }
    .cbs-player-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }
    .cbs-player-summary {
      font-size: 13px;
      line-height: 1.55;
      color: var(--text-secondary);
      margin-top: 4px;
    }
    .cbs-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .cbs-tag {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 999px;
      background: var(--bg-muted);
      color: var(--text-secondary);
      font-size: 11px;
      font-weight: 700;
    }
    .cbs-article-footer {
      display: flex;
      justify-content: flex-end;
      margin-top: 14px;
    }
    .cbs-source-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--primary-dark);
      text-decoration: none;
      font-size: 12px;
      font-weight: 700;
    }
    .cbs-source-link:hover {
      color: var(--primary);
    }

    /* ===== Modal ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      transition: opacity 200ms ease;
      padding: 20px;
    }
    .modal-overlay.show { opacity: 1; }
    .modal-box {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 24px;
      max-width: 320px;
      width: 100%;
      box-shadow: var(--shadow-lg);
      transform: scale(0.95);
      transition: transform 200ms ease;
    }
    .modal-overlay.show .modal-box { transform: scale(1); }
    .modal-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .modal-msg { font-size: 14px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 20px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .modal-btn {
      padding: 8px 20px;
      border-radius: 8px;
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background var(--transition);
    }
    .modal-btn-cancel { background: var(--bg-muted); color: var(--text-secondary); }
    .modal-btn-cancel:hover { background: var(--border); }
    .modal-btn-danger { background: var(--error); color: #fff; }
    .modal-btn-danger:hover { background: #DC2626; }

    /* ===== Reduced motion ===== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    @media (max-width: 420px) {
      .analysis-summary-grid,
      .contrib-grid,
      .analysis-split-grid {
        grid-template-columns: 1fr;
      }
      .story-row {
        grid-template-columns: 1fr;
        gap: 2px;
      }
      .analysis-team-top {
        align-items: flex-start;
      }
      .analysis-team-total .value {
        font-size: 28px;
      }
    }
  </style>
</head>

<script>
// ===== Config =====
var GAS_URL = 'https://script.google.com/macros/s/AKfycbwL78t1G40VjjtOaqTFwRP4tVwSlAQj1knAPEFgPEo35EJ4xxVGgA86GmsahCIMhP5H/exec';

function apiCall(action, params) {
  var url = GAS_URL + '?action=' + action;
  if (params) {
    Object.keys(params).forEach(function(key) {
      url += '&' + encodeURIComponent(key) + '=' + encodeURIComponent(params[key]);
    });
  }
  return fetch(url).then(function(r) { return r.json(); });
}

// ===== Tab switching =====
function switchTab(page, el) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.getElementById('page-' + page).classList.add('active');
  el.classList.add('active');
  try { sessionStorage.setItem('fantasy_active_tab', page); } catch(e) {}
  if (page === 'trade') loadTrades();
  if (page === 'news') loadNews();
  if (page === 'cbs') loadCbsNews();
  if (page === 'analysis') loadTeamAnalysisPage();
}

// ===== Team Analysis =====
var analysisState = {
  weeks: [],
  selectedWeek: null,
  loadedWeek: null,
  currentData: null,
  openTeams: {}
};

function loadTeamAnalysisPage() {
  if (analysisState.weeks.length) {
    renderWeekSwitcher();
    if (analysisState.loadedWeek !== analysisState.selectedWeek) {
      loadTeamAnalysisWeek(analysisState.selectedWeek);
    }
    return;
  }

  document.getElementById('analysis-week-switcher').innerHTML = '<div class="loading"><span class="spinner"></span>載入中</div>';
  document.getElementById('analysis-content').innerHTML = '<div class="loading"><span class="spinner"></span>載入中</div>';
  apiCall('team-analysis-weeks').then(function(data) {
    if (data.error) {
      document.getElementById('analysis-week-switcher').innerHTML = '<div class="error">' + data.error + '</div>';
      document.getElementById('analysis-content').innerHTML = '<div class="error">讀取每週分析失敗</div>';
      return;
    }
    analysisState.weeks = data.weeks || [];
    analysisState.selectedWeek = data.latestWeek || null;
    renderWeekSwitcher();
    if (!analysisState.selectedWeek) {
      renderTeamAnalysisEmpty();
      return;
    }
    loadTeamAnalysisWeek(analysisState.selectedWeek);
  }).catch(function() {
    document.getElementById('analysis-week-switcher').innerHTML = '<div class="error">載入週次失敗</div>';
    document.getElementById('analysis-content').innerHTML = '<div class="error">讀取每週分析失敗</div>';
  });
}

function renderWeekSwitcher() {
  var el = document.getElementById('analysis-week-switcher');
  if (!analysisState.weeks.length) {
    el.innerHTML = '';
    return;
  }
  el.innerHTML = analysisState.weeks.map(function(week) {
    var cls = week === analysisState.selectedWeek ? 'week-chip active' : 'week-chip';
    return '<button class="' + cls + '" onclick="selectAnalysisWeek(' + week + ')">Week ' + week + '</button>';
  }).join('');
}

function selectAnalysisWeek(week) {
  if (analysisState.selectedWeek === week) return;
  analysisState.selectedWeek = week;
  analysisState.openTeams = {};
  renderWeekSwitcher();
  loadTeamAnalysisWeek(week);
}

function loadTeamAnalysisWeek(week) {
  document.getElementById('analysis-week-meta').textContent = '讀取第 ' + week + ' 週資料中';
  document.getElementById('analysis-latest-pill').textContent = 'Week ' + week;
  document.getElementById('analysis-content').innerHTML = '<div class="loading"><span class="spinner"></span>載入中</div>';
  apiCall('team-analysis-week', { week: week }).then(function(data) {
    if (data.error) {
      document.getElementById('analysis-content').innerHTML = '<div class="error">' + data.error + '</div>';
      return;
    }
    analysisState.loadedWeek = data.week;
    analysisState.currentData = data;
    renderTeamAnalysisWeek(data);
  }).catch(function() {
    document.getElementById('analysis-content').innerHTML = '<div class="error">讀取週報失敗</div>';
  });
}

function renderTeamAnalysisEmpty() {
  document.getElementById('analysis-week-meta').textContent = '尚未產生任何週報';
  document.getElementById('analysis-latest-pill').textContent = 'No Data';
  document.getElementById('analysis-content').innerHTML = '<div class="empty-state">' +
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l3-3 3 2 4-6"/></svg>' +
    '<p>目前還沒有 team analysis 週資料</p></div>';
}

function renderTeamAnalysisWeek(payload) {
  var week = payload.week;
  var teams = payload.teams || [];
  var ai = payload.ai;
  var contributorsByTeam = payload.contributorsByTeam || {};
  document.getElementById('analysis-week-meta').textContent = teams.length
    ? ('第 ' + week + ' 週，共 ' + teams.length + ' 隊')
    : ('第 ' + week + ' 週沒有可顯示資料');
  document.getElementById('analysis-latest-pill').textContent = analysisState.weeks[0] === week ? 'Latest Week' : ('Week ' + week);

  if (!teams.length) {
    document.getElementById('analysis-content').innerHTML = '<div class="empty-state">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l3-3 3 2 4-6"/></svg>' +
      '<p>這一週尚未產生榜單</p></div>';
    return;
  }

  var summaryHtml = renderAnalysisSummaryCard(week, teams, ai);
  var teamCardsHtml = teams.map(function(team, index) {
    if (index === 0 && analysisState.openTeams[team.team_key] === undefined) {
      analysisState.openTeams[team.team_key] = true;
    }
    return renderAnalysisTeamCard(team, contributorsByTeam[team.team_key] || { top: [], bottom: [] });
  }).join('');

  document.getElementById('analysis-content').innerHTML = summaryHtml +
    '<div class="section-label" style="margin:18px 0 10px;">隊伍細節</div>' +
    '<div class="team-analysis-list">' + teamCardsHtml + '</div>';
}

function renderAnalysisSummaryCard(week, teams, ai) {
  var leader = teams.slice().sort(function(a, b) { return a.total_rank - b.total_rank; })[0];
  var strongestPitching = teams.slice().sort(function(a, b) { return b.pitcher_points - a.pitcher_points; })[0];
  var strongestHitting = teams.slice().sort(function(a, b) { return b.hitter_points - a.hitter_points; })[0];

  return '<div class="card accent-card">' +
    '<div class="section-head">' +
      '<div>' +
        '<div class="section-kicker">Week ' + week + '</div>' +
        '<div class="section-title">League pulse</div>' +
        '<div class="section-caption"></div>' +
      '</div>' +
      '<div class="pill-note">Snapshot-backed</div>' +
    '</div>' +
    '<div class="analysis-summary-grid">' +
      renderSummaryStat('總分榜首', leader.team_name, formatPoints(leader.team_points)) +
      renderSummaryStat('投手最強', strongestPitching.team_name, formatPoints(strongestPitching.pitcher_points)) +
      renderSummaryStat('打者最強', strongestHitting.team_name, formatPoints(strongestHitting.hitter_points)) +
      renderSummaryStat('聯盟中位數', '總分', formatPoints(leader.league_median_team_points)) +
    '</div>' +
    renderAiStoryBlock(ai) +
  '</div>';
}

function renderSummaryStat(label, headline, value) {
  return '<div class="analysis-stat">' +
    '<div class="analysis-stat-label">' + label + '</div>' +
    '<div style="font-size:13px;color:var(--text-secondary);margin-bottom:3px;">' + headline + '</div>' +
    '<div class="analysis-stat-value">' + value + '</div>' +
  '</div>';
}

function renderAiStoryBlock(ai) {
  if (!ai) {
    return '<div class="analysis-story-list"><div class="mini-note">這一週沒有 AI 摘要，仍可直接查看下方榜單與各隊細節。</div></div>';
  }

  var rows = [];
  pushStoryRow(rows, '升溫', ai.rising_teams);
  pushStoryRow(rows, '降溫', ai.falling_teams);
  pushStoryRow(rows, '投手', ai.pitching_story);
  pushStoryRow(rows, '打者', ai.hitting_story);
  pushStoryRow(rows, '聯盟', ai.league_story);

  if (!rows.length) {
    return '<div class="analysis-story-list"><div class="mini-note">這一週已有 AI row，但沒有可顯示的 narrative 欄位。</div></div>';
  }
  return '<div class="analysis-story-list">' + rows.join('') + '</div>';

function pushStoryRow(rows, label, text) {
  if (!text) return;
  rows.push('<div class="story-row"><div class="story-label">' + label + '</div><div class="story-text">' + text + '</div></div>');

function formatPoints(value) {
  var num = parseFloat(value);
  if (!isFinite(num)) return '0';
  return (Math.round(num * 10) / 10).toFixed(1).replace(/\.0$/, '');
}

function formatSigned(value) {
  if (value === '' || value === null || value === undefined) return '0';
  var num = parseFloat(value);
  if (!isFinite(num)) return '0';
  num = Math.round(num * 10) / 10;
  return num > 0 ? ('+' + String(num).replace(/\.0$/, '')) : String(num).replace(/\.0$/, '');
}

function formatPercent(value) {
  var num = parseFloat(value);
  if (!isFinite(num)) return '0%';
  return Math.round(num * 100) + '%';
}

function renderDelta(value, invert) {
  if (value === '' || value === null || value === undefined) {
    return '<span class="delta flat">--</span>';
  }
  var num = parseFloat(value);
  if (!isFinite(num) || num === 0) {
    return '<span class="delta flat">0</span>';
  }
  var isUp = invert ? num > 0 : num > 0;
  var cls = isUp ? 'up' : 'down';
  return '<span class="delta ' + cls + '">' + formatSigned(num) + '</span>';
}

function safeText(value, fallback) {
  return value ? value : fallback;
}

function jsString(text) {
  return String(text || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}

// ===== Stepper helper =====
function renderStepper(currentStep) {
  var steps = ['隊伍', '球員', '送出'];
  return '<div class="stepper">' + steps.map(function(label, i) {
    var n = i + 1;
    var cls = n < currentStep ? 'done' : (n === currentStep ? 'active' : '');
    var dot = n < currentStep
      ? '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
      : n;
    var line = i < steps.length - 1
      ? '<div class="step-line' + (n < currentStep ? ' done' : '') + '"></div>'
      : '';
    return '<div class="step-item ' + cls + '"><div class="step-dot">' + dot + '</div><div class="step-label">' + label + '</div></div>' + line;
  }).join('') + '</div>';
}

// ===== Teams cache (sessionStorage, 30 min TTL) =====
var TEAMS_CACHE_KEY = 'fantasy_teams';
var TEAMS_CACHE_TTL = 30 * 60 * 1000;
var teamsCache = null;

function loadTeamsCache() {
  try {
    var cached = sessionStorage.getItem(TEAMS_CACHE_KEY);
    if (cached) {
      var parsed = JSON.parse(cached);
      if (Date.now() - parsed.ts < TEAMS_CACHE_TTL) {
        teamsCache = parsed.data;
        return;
      }
    }
  } catch(e) {}
  // Prefetch teams
  apiCall('teams').then(function(data) {
    if (!data.error) {
      teamsCache = data;
      try { sessionStorage.setItem(TEAMS_CACHE_KEY, JSON.stringify({ ts: Date.now(), data: data })); } catch(e) {}
    }
  });
}

        (t.description ? '<div class="trade-desc">' + t.description + '</div>' : '') +

          '<button onclick="cancelTrade(\'' + t.id + '\', this)" style="background:none;border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:12px;color:var(--text-muted);cursor:pointer;font-family:Barlow,sans-serif;transition:all 200ms ease;">撤單</button>' +

function openModal(title, msg, onConfirm) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-msg').textContent = msg;
  var confirmBtn = document.getElementById('modal-confirm');
  var newBtn = confirmBtn.cloneNode(true);
  confirmBtn.parentNode.replaceChild(newBtn, confirmBtn);
  newBtn.addEventListener('click', function() { closeModal(); onConfirm(); });
  var overlay = document.getElementById('modal');
  overlay.style.display = 'flex';
  requestAnimationFrame(function() { overlay.classList.add('show'); });
}

function closeModal() {
  var overlay = document.getElementById('modal');
  overlay.classList.remove('show');
  setTimeout(function() { overlay.style.display = 'none'; }, 200);
}

function cancelTrade(id, btn) {
  openModal('撤銷掛單', '確定要撤銷這筆掛單嗎？此操作無法復原。', function() {
    btn.disabled = true;
    btn.textContent = '撤銷中...';
    apiCall('trade-cancel', { id: id }).then(function(data) {
      if (data.error) {
        openModal('錯誤', data.error, function() {});
        btn.disabled = false;
        btn.textContent = '撤單';
        return;
      }
      var card = btn.closest('.trade-card');
      if (card) { card.style.opacity = '0'; card.style.transition = 'opacity 300ms'; setTimeout(function() { card.remove(); }, 300); }
    }).catch(function() {
      openModal('錯誤', '撤單失敗，請稍後再試', function() {});
      btn.disabled = false;
      btn.textContent = '撤單';
    });
  });
}

function togglePlayer(el) {
  var player = JSON.parse(el.dataset.player);

    tradeState.players.push(player);

// Count stepper
var wantMin = 1, wantMax = 1;
function adjustCount(which, delta) {
  if (which === 'min') {
    wantMin = Math.max(1, Math.min(10, wantMin + delta));
    if (wantMin > wantMax) wantMax = wantMin;
  } else {
    wantMax = Math.max(1, Math.min(10, wantMax + delta));
    if (wantMax < wantMin) wantMin = wantMax;
  }
  document.getElementById('want-min').textContent = wantMin;
  document.getElementById('want-max').textContent = wantMax;
}

function togglePosChip(el, pos) {
  var idx = tradeState.wantedPositions.indexOf(pos);
  if (idx > -1) {
    tradeState.wantedPositions.splice(idx, 1);
    el.classList.remove('selected');
  } else {
    tradeState.wantedPositions.push(pos);
    el.classList.add('selected');
  }
}

function submitTrade() {
  var btn = document.querySelector('.submit-btn');
  btn.disabled = true;
  btn.textContent = '送出中...';
  var statusEl = document.getElementById('trade-submit-status');

  var wantedStr = tradeState.wantedPositions.length > 0
    ? '想要位置：' + tradeState.wantedPositions.join(', ')
    : '';
  var descText = document.getElementById('trade-description').value;
  var fullDesc = [wantedStr, descText].filter(Boolean).join('\n');

  apiCall('trade-create', {
    teamKey: tradeState.teamKey,
    teamName: tradeState.teamName,
    managerName: tradeState.managerName,
    playerKeys: tradeState.players.map(function(p) { return p.playerKey; }).join(','),
    playerNames: tradeState.players.map(function(p) { return p.name; }).join(','),
    positions: tradeState.players.map(function(p) { return p.position; }).join(','),
    wantCount: wantMin === wantMax ? String(wantMin) : wantMin + '~' + wantMax,
    description: fullDesc
  }).then(function(data) {
    if (data.error) {
      statusEl.innerHTML = '<span class="error">' + data.error + '</span>';
      btn.disabled = false;
      btn.textContent = '送出掛單';
      return;
    }
    statusEl.innerHTML = '<span class="success-msg">掛單成功！</span>';
    setTimeout(function() { showTradeList(); }, 1500);
  }).catch(function() {
    statusEl.innerHTML = '<span class="error">送出失敗</span>';
    btn.disabled = false;
    btn.textContent = '送出掛單';
  });
}

// ===== News =====
// ===== News with sessionStorage cache (10 min TTL) =====
var NEWS_CACHE_KEY = 'fantasy_news';
var NEWS_CACHE_TTL = 10 * 60 * 1000; // 10 minutes
var CBS_NEWS_CACHE_KEY = 'fantasy_cbs_sleepers';
var CBS_NEWS_CACHE_TTL = 10 * 60 * 1000; // 10 minutes
var CBS_NEWS_INDEX_URL = './data/cbs-news/index.json';

function renderNews(data) {
  var el = document.getElementById('news-list');
  if (!data || !data.length) {
    el.innerHTML = '<div class="empty-state">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8V6Z"/></svg>' +
      '<p>目前沒有新聞</p></div>';
    return;
  }
  el.innerHTML = data.map(function(n) {
    var dateStr = n.pub_date ? new Date(n.pub_date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';
    return '<a href="' + (n.link || '#') + '" target="_blank" rel="noopener" style="text-decoration:none;display:block;">' +
      '<div class="trade-card" style="cursor:pointer;">' +
        '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">' +
          '<div style="font-size:14px;font-weight:600;color:var(--text);line-height:1.4;">' + (n.title || '') + '</div>' +
          '<div style="font-size:11px;color:var(--text-muted);white-space:nowrap;flex-shrink:0;">' + dateStr + '</div>' +
        '</div>' +
        (n.description ? '<div style="font-size:13px;color:var(--text-secondary);margin-top:6px;line-height:1.5;">' + n.description + '</div>' : '') +
      '</div></a>';
  }).join('');
}

function escapeHtml(value) {
  return String(value || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function fetchJson(url) {
  return fetch(url).then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  });
}

function formatCbsArticleType(articleType) {
  if (articleType === 'sleeper_pitchers') return 'Sleeper Pitchers';
  if (articleType === 'sleeper_hitters') return 'Sleeper Hitters';
  return articleType || 'CBS Article';
}

function normalizeCbsArticle(doc) {
  if (!doc || !doc.source_article) return null;
  var players = Array.isArray(doc.players) ? doc.players : [];
  var source = doc.source_article || {};
  if (source.article_type !== 'sleeper_pitchers' && source.article_type !== 'sleeper_hitters') {
    return null;
  }
  return {
    articleType: source.article_type,
    week: source.week,
    title: source.title_en,
    url: source.url,
    publishedAt: source.published_at,
    players: players
  };
}

function renderCbsNews(data) {
  var el = document.getElementById('cbs-news-list');
  if (!data || !data.length) {
    el.innerHTML = '<div class="empty-state">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 0 6.5 22H20"/><path d="M20 2H8a2 2 0 0 0-2 2v15.5"/><path d="M8 7h8"/><path d="M8 11h8"/><path d="M8 15h5"/></svg>' +
      '<p>目前沒有 CBS sleeper JSON</p></div>';
    return;
  }

  el.innerHTML = '<div class="cbs-news-list">' + data.map(function(article) {
    var dateStr = article.publishedAt
      ? new Date(article.publishedAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
      : '';
    var playerHtml = (article.players || []).map(function(player) {
      var tags = (player.tags || []).map(function(tag) {
        return '<span class="cbs-tag">' + escapeHtml(tag) + '</span>';
      }).join('');
      return '<div class="cbs-player-row">' +
        '<div class="cbs-rank">#' + escapeHtml(player.rank) + '</div>' +
        '<div class="cbs-player-main">' +
          '<div class="cbs-player-name">' + escapeHtml(player.name_en) + '</div>' +
          '<div class="cbs-player-summary">' + escapeHtml(player.summary_zh_tw) + '</div>' +
          (tags ? '<div class="cbs-tags">' + tags + '</div>' : '') +
        '</div>' +
      '</div>';
    }).join('');

    return '<div class="cbs-article-card">' +
      '<div class="cbs-article-head">' +
        '<div>' +
          '<div class="cbs-article-title">' + escapeHtml(article.title) + '</div>' +
          '<div class="cbs-article-meta">' +
            '<span>Week ' + escapeHtml(article.week) + '</span>' +
            (dateStr ? '<span>' + escapeHtml(dateStr) + '</span>' : '') +
            '<span>' + escapeHtml((article.players || []).length) + ' players</span>' +
          '</div>' +
        '</div>' +
        '<div class="cbs-type-pill">' + escapeHtml(formatCbsArticleType(article.articleType)) + '</div>' +
      '</div>' +
      '<div class="cbs-player-list">' + playerHtml + '</div>' +
      '<div class="cbs-article-footer"><a class="cbs-source-link" href="' + escapeHtml(article.url) + '" target="_blank" rel="noopener">原文連結</a></div>' +
    '</div>';
  }).join('') + '</div>';
}

function loadCbsNews() {
  var el = document.getElementById('cbs-news-list');
  try {
    var cached = sessionStorage.getItem(CBS_NEWS_CACHE_KEY);
    if (cached) {
      var parsed = JSON.parse(cached);
      if (Date.now() - parsed.ts < CBS_NEWS_CACHE_TTL) {
        renderCbsNews(parsed.data);
        return;
      }
    }
  } catch(e) {}

  el.innerHTML = '<div class="loading"><span class="spinner"></span>載入中</div>';
  fetchJson(CBS_NEWS_INDEX_URL).then(function(index) {
    var entries = (index.articles || []).filter(function(article) {
      return article.article_type === 'sleeper_hitters' || article.article_type === 'sleeper_pitchers';
    });
    return Promise.all(entries.map(function(entry) {
      return fetchJson(entry.path).then(normalizeCbsArticle);
    }));
  }).then(function(items) {
    var articles = items.filter(Boolean).sort(function(a, b) {
      return new Date(b.publishedAt || 0).getTime() - new Date(a.publishedAt || 0).getTime();
    });
    try { sessionStorage.setItem(CBS_NEWS_CACHE_KEY, JSON.stringify({ ts: Date.now(), data: articles })); } catch(e) {}
    renderCbsNews(articles);
  }).catch(function() {
    el.innerHTML = '<div class="error">CBS sleeper JSON 載入失敗</div>';
  });
}

function loadNews() {
  var el = document.getElementById('news-list');

  // Check cache
  try {
    var cached = sessionStorage.getItem(NEWS_CACHE_KEY);
    if (cached) {
      var parsed = JSON.parse(cached);
      if (Date.now() - parsed.ts < NEWS_CACHE_TTL) {
        renderNews(parsed.data);
        return;
      }
    }
  } catch(e) {}

  el.innerHTML = '<div class="loading"><span class="spinner"></span>載入中</div>';
  apiCall('news', { limit: 20 }).then(function(data) {
    if (data.error) { el.innerHTML = '<div class="error">' + data.error + '</div>'; return; }
    // Save to cache
    try { sessionStorage.setItem(NEWS_CACHE_KEY, JSON.stringify({ ts: Date.now(), data: data })); } catch(e) {}
    renderNews(data);
  }).catch(function() { el.innerHTML = '<div class="error">載入失敗</div>'; });
}

// ===== Init: 同時載入交易市場和球員動態 =====
if (GAS_URL) {
  loadTeamsCache();
  var initialTab = 'trade';
  try {
    var savedTab = sessionStorage.getItem('fantasy_active_tab');
    if (savedTab && document.getElementById('page-' + savedTab)) {
      initialTab = savedTab;
    }
  } catch(e) {}

  var tabButtons = document.querySelectorAll('.tab');
  for (var i = 0; i < tabButtons.length; i++) {
    var btn = tabButtons[i];
    var onclickText = btn.getAttribute('onclick') || '';
    if (onclickText.indexOf("switchTab('" + initialTab + "'") !== -1) {
      switchTab(initialTab, btn);
      break;
    }
  }
}
